theme: jekyll-theme-chirpy

lang: en
timezone: Asia/Kolkata

title: Aravind
tagline: Cybersecurity Researcher

description: >-
  Cybersecurity research notes, threat detection, and blue team operations.

url: "https://spirit7-sudo.github.io"
baseurl: ""

avatar: /assets/img/avatar.png

github:
  username: spirit7-sudo    # ← replace with your GitHub username

twitter:
  username: ""

social:
  name: Aravind
  email: ""
  links:
    - https://github.com/spirit7-sudo   # ← replace


paginate: 10

toc: true

comments:
  active: ""

analytics:
  google:
    id: ""

pwa:
  enabled: false

# ─── THIS IS THE KEY FIX ───────────────────────────────────────────
# Chirpy's sidebar reads site.tabs which comes from this collection.
# Without this block, _tabs/*.md files are ignored and the sidebar
# only ever shows "Home".
collections:
  tabs:
    output: true
    sort_by: order
# ───────────────────────────────────────────────────────────────────

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/

  - scope:
      path: _drafts
    values:
      comments: false

  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - tools
  - README.md
  - CHANGELOG.md
  - LICENSE
  - rollup.config.js
  - node_modules
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-archives
